<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="bg-lime-700 shadow mx-auto text-center p-4">
    <h1 class="text-2xl font-bold text-white pb-1">あんこ CAFE</h1>
    <p class="text-white text-2lm pb-1 font-bold">MENU</p>
    </header>

    <main class="max-w-full mx-auto px-4 py-8 bg-gradient-to-b from-lime-700 to-purple-300">
    <section class="mb-8 max-w-xl mx-auto shadow">
        <h2 class="text-xl font-bold text-white mb-1">フードセット</h2>
        <p class="text-lm text-white mt-2 mb-4">選べるフード＋抹茶のセット</p>

        <div class="bg-white/70 backdrop-blur-md rounded-lg border border-white/70 shadow p-6 mb-6 hover:bg-white">
            <h3 class="text-lg font-bold text-gray-900">どら焼きセット</h3>
            <p class="text-gray-600 mt-1">本日のおすすめ。ふわふわの生地とあんこの相性が抜群です。</p>
            <p class="text-blue-600 font-bold mt-2">500円</p>
        </div>

        <div class="bg-white/70 backdrop-blur-md rounded-lg border boder-white/70 shadow p-6 mt-4 mb-6 hover:bg-white">
            <h3 class="text-lg font-bold text-gray-900">あんみつセット</h3>
            <p class="text-gray-600 mt-1">当店1番の人気セット。具だくさんで満足感たっぷりです。</p>
            <p class="text-blue-600 font-bold mt-2">700円</p>
        </div>
        </section>
    </main>

    <footer class="bg-purple-100 text-center py-6 text-gray-500 text-sm">
        <p>2026 あんこCAFE</p>
    </footer>
</body>
</html>
